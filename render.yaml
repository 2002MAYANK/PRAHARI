# =============================================================================
# Render Blueprint – Prahari
# Docs: https://render.com/docs/blueprint-spec
# =============================================================================
# To deploy:
#   1. Push this file to your GitHub/GitLab repo
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect your repo → Render auto-detects render.yaml
#   4. Fill in the environment variable values when prompted
#   5. Click "Apply" to deploy everything at once
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Web Service (Laravel API + Admin Panel)
  # ---------------------------------------------------------------------------
  - type: web
    name: prahari
    runtime: docker
    region: singapore  # Closest to India
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # --- App ---
      - key: APP_NAME
        value: Prahari
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false  # Set after first deploy (e.g. https://prahari.onrender.com)
      - key: APP_KEY
        value: ""  # Left empty; entrypoint.sh auto-generates a valid Laravel key
      - key: APP_LOCALE
        value: en
      - key: APP_MAINTENANCE_DRIVER
        value: file

      # --- Security ---
      - key: BCRYPT_ROUNDS
        value: "12"

      # --- Logging ---
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning

      # --- Database (PostgreSQL – Render managed) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: prahari-db
          property: connectionString

      # --- Session & Cache ---
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_ENCRYPT
        value: "false"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local

      # --- Mail (configure for production) ---
      - key: MAIL_MAILER
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Prahari

      # --- Default Admin (seeded on first deploy) ---
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        value: admin@prahari.com
      - key: ADMIN_PASSWORD
        sync: false  # Change this on Render dashboard!

      # --- Sanctum ---
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false  # e.g. prahari.onrender.com

  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Render free tier)
  # ---------------------------------------------------------------------------
databases:
  - name: prahari-db
    plan: free
    region: singapore
    databaseName: prahari
    user: prahari_user
